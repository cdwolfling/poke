  if (state.playedP1) addCard(state.playedP1);
  if (state.playedP2) addCard(state.playedP2);

  // 未知牌 = deck 中不在 seenKeys 的牌
  return deck.filter(c => !seenKeys.has(c.rank + c.suit));
}

/**
 * 采样一个完备信息世界。
 * 将未知牌随机填入对手的隐藏区域（手牌 + 面下牌）。
 */
function sampleWorld(state, botId) {
  const unknown = getUnknownCards(state, botId);
  // 洗牌
  const shuffled = [...unknown];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  const oppId = botId === 'p1' ? 'p2' : 'p1';
  const sample = cloneState(state);
  const opp = sample[oppId];
  let idx = 0;

  // 填对手手牌
  for (let i = 0; i < opp.hand.length; i++) {
    opp.hand[i] = shuffled[idx++];
  }

  // 填对手面下牌
  for (let i = 0; i < opp.table.length; i++) {
    if (opp.table[i].down) {
      opp.table[i].down = shuffled[idx++];
    }
  }

  return sample;
}

// ── Alpha-Beta 搜索 ───────────────────────────────────────────

/**
 * 获取当前该谁出牌。
 */
function getCurrentPlayer(state) {
  if (state.phase !== 'select') return null;
  if (state.playedP1 === null && state.playedP2 === null) {
    return state.firstPlayer === 1 ? 'p1' : 'p2';
  }
  if (state.playedP1 !== null && state.playedP2 === null) return 'p2';
  if (state.playedP2 !== null && state.playedP1 === null) return 'p1';
  return null;
}

function getLeadCard(state, playerId) {
  const oppId = playerId === 'p1' ? 'p2' : 'p1';
  if (state[oppId] && state.playedP1 !== null && state.playedP2 !== null) {
    // Both played — should not happen in select phase
    return null;
  }
  if (playerId === 'p1' && state.playedP2) return state.playedP2;
  if (playerId === 'p2' && state.playedP1) return state.playedP1;
  return null;
}

/**
 * 走法排序：优先搜索更好的走法（提高剪枝效率）。
 */
function orderMoves(moves, state, playerId) {
  return moves.sort((a, b) => {
    const cardA = a.card || state[playerId].hand[a.index] || (state[playerId].table[a.index]?.face);
    const cardB = b.card || state[playerId].hand[b.index] || (state[playerId].table[b.index]?.face);
    if (!cardA || !cardB) return 0;

    // 优先出分数牌
    const scoreA = getCardScore(cardA);
    const scoreB = getCardScore(cardB);
    if (scoreA !== scoreB) return scoreB - scoreA;

    // 其次出特权牌
    const privA = isPrivileged(cardA, state.dragonSuit) ? 1 : 0;
    const privB = isPrivileged(cardB, state.dragonSuit) ? 1 : 0;
    if (privA !== privB) return privB - privA;

    // 再按牌力排序（大牌优先尝试）
    return getCardPower(cardB, state.dragonSuit) - getCardPower(cardA, state.dragonSuit);
  });
}

/**
 * 模拟走完一轮（两方出牌 + 结算 + 推进）。
 */
function simulateRound(state, playerId, move) {
  let ns = applyMove(cloneState(state), playerId, move);

  // 如果双方都已出牌，结算
  if (ns.playedP1 !== null && ns.playedP2 !== null) {
    ns = resolveRound(ns);
    if (ns.phase === 'reveal' && ns.round < TOTAL_ROUNDS) {
      ns = advanceRound(ns);
    }
  }
  return ns;
}

/**
 * Alpha-Beta 搜索核心。
 */
function alphaBeta(state, depth, alpha, beta, botId, startTime) {
  // 时间限制
  if (Date.now() - startTime > V3_HIGH_CONFIG.timeLimitMs) {
    return evaluate(state, botId);
  }

  if (depth <= 0 || state.phase === 'gameover') {
    return evaluate(state, botId);
  }

  const playerId = getCurrentPlayer(state);
  if (!playerId) return evaluate(state, botId);

  const leadCard = getLeadCard(state, playerId);
  let moves = getLegalMoves(state[playerId], leadCard, state.dragonSuit);

  if (!moves || moves.length === 0) return evaluate(state, botId);

  // 走法排序
  moves = orderMoves(moves, state, playerId);

  const isBot = playerId === botId;

  if (isBot) {
    // 最大化节点（bot 自己的走法）
    let bestValue = -Infinity;
    for (const move of moves) {
      const ns = simulateRound(state, playerId, move);
      const val = alphaBeta(ns, depth - 1, alpha, beta, botId, startTime);
      bestValue = Math.max(bestValue, val);
      alpha = Math.max(alpha, val);
      if (beta <= alpha) break; // Beta 剪枝
    }
    return bestValue;
  } else {
    // 最小化节点（对手的走法）
    let bestValue = Infinity;
    for (const move of moves) {
      const ns = simulateRound(state, playerId, move);
      const val = alphaBeta(ns, depth - 1, alpha, beta, botId, startTime);
      bestValue = Math.min(bestValue, val);
      beta = Math.min(beta, val);
      if (beta <= alpha) break; // Alpha 剪枝
    }
    return bestValue;
  }
}

/**
 * 在单个采样世界上搜索最优走法。
 */
function searchBestMove(state, botId, depth, startTime) {
  const playerId = getCurrentPlayer(state);
  if (!playerId || playerId !== botId) return null;

  const leadCard = getLeadCard(state, playerId);
  const moves = getLegalMoves(state[playerId], leadCard, state.dragonSuit);
  if (!moves || moves.length === 0) return null;

  let bestMove = moves[0];
  let bestValue = -Infinity;

  for (const move of orderMoves(moves, state, playerId)) {
    if (Date.now() - startTime > V3_HIGH_CONFIG.timeLimitMs) break;

    const ns = simulateRound(state, playerId, move);
    const val = alphaBeta(ns, depth - 1, -Infinity, Infinity, botId, startTime);

    if (val > bestValue) {
      bestValue = val;
      bestMove = move;
    }
  }

  return bestMove;
}

// ── Determinized Search Bot ────────────────────────────────────

/**
 * V3 主入口：Determinizated Alpha-Beta Search。
 *
 * @param {object} state - 当前游戏状态
 * @param {'p1'|'p2'} playerId - 哪个玩家是 bot
 * @param {object|null} leadCard - 先手出的牌（跟牌时）
 * @returns {{ type: 'hand'|'face', index: number }|null}
 */
function V3HighChoose(state, playerId, leadCard) {
  const startTime = Date.now();

  // 如果 bot 不是当前行动方，不决策
  if (getCurrentPlayer(state) !== playerId) return null;

  // 简单走法：仅有 1 个合法走法时直接返回
  const moves = getLegalMoves(state[playerId], leadCard, state.dragonSuit);
  if (!moves || moves.length === 0) return null;
  if (moves.length === 1) return moves[0];

  // 残局时增加搜索深度
  const roundsLeft = TOTAL_ROUNDS - state.round + 1;
  const depth = roundsLeft <= V3_HIGH_CONFIG.endgameThreshold
    ? V3_HIGH_CONFIG.endgameDepth
    : V3_HIGH_CONFIG.depth;

  // 投票统计：每个采样世界投票支持哪个走法
  const voteMap = new Map();
  moves.forEach(m => voteMap.set(`${m.type}-${m.index}`, { move: m, votes: 0, totalValue: 0 }));

  const sampleCount = Math.min(V3_HIGH_CONFIG.sampleCount, 200); // 上限 200

  for (let s = 0; s < sampleCount; s++) {
    if (Date.now() - startTime > V3_HIGH_CONFIG.timeLimitMs * 0.8) break;

    // 1. 采样一个完备信息世界
    const world = sampleWorld(state, playerId);

    // 2. 在该世界上搜索最优走法
    const best = searchBestMove(world, playerId, depth, startTime);
    if (best) {
      const key = `${best.type}-${best.index}`;
      const entry = voteMap.get(key);
      if (entry) {
        entry.votes++;
        // 用搜索得到的评价值加权
        // （被更高 eval 选中的走法权重大）
      }
    }
  }

  // 胜者：得票最多的走法；平局时用 evaluation 值排序
  let bestEntry = null;
  let maxVotes = -1;
  for (const entry of voteMap.values()) {
    if (entry.votes > maxVotes) {
      maxVotes = entry.votes;
      bestEntry = entry;
    }
  }

  if (!bestEntry) return moves[0];
  return bestEntry.move;
}

// ── src/ai/V4.js ──────────────────────────────────────

// ═══════════════════════════════════════════════════════════════════
// V4.js — 混合策略：V3 搜索先手 + V4 启发式后手
// ═══════════════════════════════════════════════════════════════════
//
// 核心发现：
//   - V3 search 在先手时比 V4 启发式强
//   - V4 启发式在后手时比 V3 search 强
//   - 结合两者 = 最佳策略
// ═══════════════════════════════════════════════════════════════════

// ── 后手策略（启发式，比 V3 search 更强）──
function followChoose(state, playerId, leadCard) {
  const player = state[playerId];
  const { dragonSuit } = state;

  const playable = [
    ...player.hand.map((c, i) => ({ type: 'hand', index: i, card: c })),
    ...player.table
      .map((s, i) => s.face ? { type: 'face', index: i, card: s.face } : null)
      .filter(Boolean),
  ];

  if (playable.length === 0) return null;

  // 能赢的牌
  const winners = playable.filter(a => canSecondCardWin(leadCard, a.card, dragonSuit));

  if (winners.length > 0) {
    // 先手是分数牌 → 出最小的能赢的牌
    if (getCardScore(leadCard) > 0) {
      // 优先出分数牌中的赢家（用分数牌赢分数牌，但出最小的）
      const scoreWinners = winners.filter(a => getCardScore(a.card) > 0);
      if (scoreWinners.length > 0) {
        scoreWinners.sort((a, b) => getCardPower(a.card, dragonSuit) - getCardPower(b.card, dragonSuit));
        return scoreWinners[0];
      }
      // 没有分数牌赢家，出最小的赢家
      winners.sort((a, b) => getCardPower(a.card, dragonSuit) - getCardPower(b.card, dragonSuit));
      return winners[0];
    }

    // 先手不是分数牌 → 出最小的能赢的牌（节省大牌）
    winners.sort((a, b) => getCardPower(a.card, dragonSuit) - getCardPower(b.card, dragonSuit));
    return winners[0];
  }

  // 不能赢：出最小的非分数牌（弃牌保分）
  const nonScore = playable.filter(a => getCardScore(a.card) === 0);
  if (nonScore.length > 0) {
    nonScore.sort((a, b) => getCardPower(a.card, dragonSuit) - getCardPower(b.card, dragonSuit));
    return nonScore[0];
  }
  // 只剩分数牌，出最小的
  playable.sort((a, b) => getCardPower(a.card, dragonSuit) - getCardPower(b.card, dragonSuit));
  return playable[0];
}

// ── V4 主入口：先手用 V3 search，后手用启发式 ──
function V4Choose(state, playerId, leadCard) {
  if (!leadCard) {
    // 先手：用 V3 的搜索（更强）
    return V3Choose(state, playerId, leadCard);
  } else {
    // 后手：用启发式（更强）
    return followChoose(state, playerId, leadCard);
  }
}

// ── src/ai/bot.js ──────────────────────────────────────

// ═══════════════════════════════════════════════════════════════════
// bot.js - Bot factory
// ═══════════════════════════════════════════════════════════════════

const BOT_STRATEGIES = {
  V1: easyChoose,
  V2: normalChoose,
  V3: V3Choose,
  'V3-high': V3HighChoose,
  V4: V4Choose,
};

/**
 * Factory: get a bot move for the given strategy.
 *
 * @param {'V1'|'V2'|'V3'} strategyName
 * @param {object} state - Full game state
 * @param {'p1'|'p2'} playerId - Which player this bot controls
 * @param {object|null} leadCard - Card that was led, or null if bot is leading
 * @returns {{ type: 'hand'|'face', index: number }|null}
 */
function getBotMove(strategyName, state, playerId, leadCard) {
  const fn = BOT_STRATEGIES[strategyName];
  if (!fn) {
    console.warn(`Unknown strategy "${strategyName}", falling back to "easy"`);
    return BOT_STRATEGIES.easy(state, playerId, leadCard);
  }
  return fn(state, playerId, leadCard);
}

// ── src/ui/adapter.js ──────────────────────────────────────

// ═══════════════════════════════════════════════════════════════════
// adapter.js - UI Adapter: bridges game engine to DOM
// ═══════════════════════════════════════════════════════════════════

// ── State ────────────────────────────────────────────────────────
let state = null;
let autoAdvanceTimer = null;

// ── Init ─────────────────────────────────────────────────────────
function initGame() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  state = createState({ p1: 'V1', p2: 'V3' });
  document.getElementById('btn-play').disabled = true;
  renderAll();
}

// ── Rendering ────────────────────────────────────────────────────

/** Get the playable cards for the human player (P1) as a Set of "type-index" strings */
function getPlayableSet() {
  if (state.phase !== 'select') return new Set();
  const leadCard = (state.firstPlayer === 2) ? state.playedP2 : null;
  if (state.firstPlayer === 2 && !leadCard) return new Set();
  const moves = getLegalMoves(state.p1, leadCard, state.dragonSuit);
  return new Set(moves.map(m => `${m.type}-${m.index}`));
}

function renderAll() {
  renderDragonInfo();
  renderPlayerZone('p1');
  renderPlayerZone('p2');
  renderPlayArea();
  renderStatus();
  renderButtons();
  renderHistory();
  document.querySelector('h1 .ver').textContent = 'v2026.5.4.1';
}

function renderDragonInfo() {
  const el = document.getElementById('dragon-info');
  if (!state.dragonSuit) { el.textContent = ''; return; }
  const sn = { '♠':'黑桃','♥':'红心','♦':'方块','♣':'梅花' };
  el.textContent = `🐉 天龙人花色：${state.dragonSuit} ${sn[state.dragonSuit] || ''}（${state.dragonSuit} + 大小鬼 = 15 张特权阶级）`;
}

function renderPlayerZone(pid) {
  const p = state[pid];
  const playableSet = (pid === 'p1') ? getPlayableSet() : new Set();

  // ── Face table ──
  const faceEl = document.getElementById(`face-${pid}`);
  faceEl.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const slot = p.table[i];
    const canSel = pid === 'p1' && slot.face && playableSet.has(`face-${i}`);
    const ts = makeTableSlotEl(slot, canSel);
    if (canSel) {
      const isSel = state.selectedSource && state.selectedSource.type === 'face' && state.selectedSource.index === i;
      if (isSel) ts.faceEl.classList.add('selected');
      const fi = i;
      ts.faceEl.addEventListener('click', () => onCardClick({ type: 'face', index: fi }));
    }
    faceEl.appendChild(ts.el);
  }

  // ── Hand ──
  const handEl = document.getElementById(`hand-${pid}`);
  handEl.innerHTML = '';
  if (pid === 'p1') {
    p.hand.forEach((card, idx) => {
      const canSel = playableSet.has(`hand-${idx}`);
      const el = makeCardEl(card, canSel);
      if (canSel) {
        const isSel = state.selectedSource && state.selectedSource.type === 'hand' && state.selectedSource.index === idx;
        if (isSel) el.classList.add('selected');
        el.addEventListener('click', () => onCardClick({ type: 'hand', index: idx }));
      }
      handEl.appendChild(el);
    });
  } else {
    // P2 hand: face-down stack
    p.hand.forEach((_, idx) => {
      const el = makeCardEl(null, false, true);
      el.style.setProperty('--stack-i', idx);
      handEl.appendChild(el);
    });
    const countEl = document.getElementById('hand-count-p2');
    if (countEl) countEl.textContent = `${p.hand.length}张`;
  }

  // First-player badge
  const badge = document.getElementById(`badge-${pid}`);
  badge.style.display = (state.phase === 'select' && state.firstPlayer === (pid === 'p1' ? 1 : 2)) ? '' : 'none';

  // Info line
  const hc = p.hand.length, fc = p.table.filter(s => s.face).length, dc = p.table.filter(s => s.down).length;
  const sc = pid === 'p1' ? state.p1.score : state.p2.score;
  document.getElementById(`info-${pid}`).textContent = `手牌: ${hc}张 | 桌面牌: ${fc}张 | 底牌: ${dc}张 | 得分: ${sc}分`;

  renderScorePile(pid);
}

function renderScorePile(pid) {
  const el = document.getElementById(`score-pile-${pid}`);
  const cards = pid === 'p1' ? state.p1.scoreCards : state.p2.scoreCards;
  const total = pid === 'p1' ? state.p1.score : state.p2.score;
  const visibleCards = cards.slice(-14);
  el.innerHTML = '';

  const title = document.createElement('div');
  title.classList.add('score-pile-title');
  title.textContent = pid === 'p1' ? '你得分牌' : 'AI得分牌';
  el.appendChild(title);

  const stack = document.createElement('div');
  stack.classList.add('score-stack');
  if (visibleCards.length === 0) {
    const empty = makeCardEl(null, false, false);
    empty.classList.add('card', 'empty');
    stack.appendChild(empty);
  } else {
    visibleCards.forEach((card, idx) => {
      const cardEl = makeCardEl(card);
      cardEl.style.setProperty('--stack-i', idx);
      cardEl.style.setProperty('--stack-col', idx % 2);
      cardEl.style.setProperty('--stack-row', Math.floor(idx / 2));
      stack.appendChild(cardEl);
    });
  }
  el.appendChild(stack);

  const count = document.createElement('div');
  count.classList.add('score-count');
  count.textContent = cards.length ? `${cards.length}张 / ${total}分` : '暂无';
  el.appendChild(count);
}

function renderPlayArea() {
  document.getElementById('played-p1').innerHTML = state.playedP1 ? makeCardEl(state.playedP1).outerHTML : makeEmptyEl().outerHTML;
  document.getElementById('played-p2').innerHTML = state.playedP2 ? makeCardEl(state.playedP2).outerHTML : makeEmptyEl().outerHTML;
  const re = document.getElementById('result-banner');

  if (state.phase === 'reveal' && state.roundResult) {
    const msgs = { p1: `🎉 你得${state.roundScore}分！`, p2: `🤖 AI得${state.roundScore}分！`, tie: `🤝 平！(无人得分)` };
    re.textContent = msgs[state.roundResult];
  } else if (state.phase === 'gameover') {
    if (state.p1.score > state.p2.score) re.textContent = `🏆 你赢了！ ${state.p1.score}:${state.p2.score}`;
    else if (state.p2.score > state.p1.score) re.textContent = `🤖 AI赢了！ ${state.p1.score}:${state.p2.score}`;
    else re.textContent = `🤝 平局！ ${state.p1.score}:${state.p2.score}`;
  } else re.textContent = '——';
}

function renderStatus() {
  const el = document.getElementById('status-bar');
  if (state.phase === 'gameover') {
    el.textContent = `游戏结束！ 你 ${state.p1.score} 分 vs AI ${state.p2.score} 分`;
    return;
  }
  const first = state.firstPlayer === 1 ? '你' : 'AI';
  if (state.phase === 'select') {
    const hint = state.firstPlayer === 2 ? '请跟牌（同花色）' : '请选一张牌出';
    el.textContent = `R${state.round}/27 | 先手：${first} | ${state.p1.score}:${state.p2.score} | ${hint}`;
  } else {
    el.textContent = `R${state.round}/27 结果 | 本轮${state.roundScore}分 | 即将自动进入下一回合……`;
  }
}

function renderButtons() {
  const bp = document.getElementById('btn-play');
  if (state.phase === 'select') {
    bp.style.display = '';
    bp.disabled = !state.selectedSource;
  } else bp.style.display = 'none';
}

function renderHistory() {
  const el = document.getElementById('history-panel');
  let html = '<h3>📜 最近回合</h3>';
  if (state.history.length === 0) {
    el.innerHTML = `${html}<div class="history-row"><span class="hr-round">暂无</span></div>`;
    return;
  }
  for (const h of state.history) {
    const wLabel = h.winner === 'p1' ? '<span class="hr-win">你胜</span>'
                  : h.winner === 'p2' ? '<span class="hr-lose">AI胜</span>'
                  : '<span class="hr-tie">平局</span>';
    const pts = h.points > 0 ? ` <span class="hr-pts">+${h.points}分</span>` : '';
    const p1c = cardToLabel(h.p1);
    const p2c = cardToLabel(h.p2);
    html += `<div class="history-row">
      <span class="hr-round">R${h.round}</span>
      <span class="hr-card ${h.p1.color || ''}">${p1c}</span>
      <span style="color:#888">vs</span>
      <span class="hr-card ${h.p2.color || ''}">${p2c}</span>
      ${wLabel}${pts}
    </div>`;
  }
  el.innerHTML = html;
}

// ── Card DOM Helpers ─────────────────────────────────────────────

function makeCardEl(card, selectable = false, faceDown = false) {
  const el = document.createElement('div');
  el.classList.add('card');
  if (faceDown) { el.classList.add('face-down'); return el; }
  if (!card) return el;
  el.classList.add(card.color || 'black');
  if (selectable) el.classList.add('selectable');
  if (isJoker(card)) {
    el.innerHTML = `<span class="top">🃏</span><span class="suit" style="font-size:0.65rem">${card.rank}</span><span class="bottom">🃏</span>`;
  } else {
    el.innerHTML = `<span class="top">${card.rank}</span><span class="suit">${card.suit}</span><span class="bottom">${card.rank}</span>`;
  }
  return el;
}

function makeTableSlotEl(slot, selectable = false) {
  const el = document.createElement('div');
  el.classList.add('table-slot');
  if (slot.down) {
    const under = makeCardEl(null, false, true);
    under.classList.add('under-card');
    el.appendChild(under);
  }
  const faceEl = slot.face ? makeCardEl(slot.face, selectable) : makeEmptyEl();
  faceEl.classList.add('face-card');
  el.appendChild(faceEl);
  return { el, faceEl };
}

function makeEmptyEl() {
  const el = document.createElement('div');
  el.classList.add('card', 'empty');
  return el;
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── Game Logic ───────────────────────────────────────────────────

function onCardClick(move) {
  // P1 能选牌的条件：phase='select' 且（P1 先手 或 AI 已出牌等待回应）
  if (state.phase !== 'select') return;
  if (state.firstPlayer !== 1 && state.playedP2 === null) return;
  const isSel = state.selectedSource &&
    state.selectedSource.type === move.type &&
    state.selectedSource.index === move.index;
  state.selectedSource = isSel ? null : move;
  renderAll();
}

function playTurn() {
  if (state.phase !== 'select') return;
  if (!state.selectedSource) { setStatus('请先选择一张牌！'); return; }

  const isP1First = (state.firstPlayer === 1);

  // P1 plays
  state = applyMove(state, 'p1', state.selectedSource);
  state.selectedSource = null;

  // Track face-up index
  if (state.playedP1Source && state.playedP1Source.type === 'face') {
    // Face index tracking handled by resolveRound / advanceRound
  }

  // AI plays
  if (isP1First) {
    const aiMove = getBotMove(state.strategies.p2, state, 'p2', state.playedP1);
    if (aiMove) state = applyMove(state, 'p2', aiMove);
  }

  // Resolve round
  state = resolveRound(state);
  renderAll();

  if (!isTerminal(state)) {
    autoAdvanceTimer = setTimeout(() => {
      autoAdvanceTimer = null;
      nextRound();
    }, 1500);
  }
}

function nextRound() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  if (state.phase !== 'reveal') return;
  state = advanceRound(state);
  renderAll();

  // AI goes first next round
  if (state.firstPlayer === 2 && state.phase === 'select') {
    const aiMove = getBotMove(state.strategies.p2, state, 'p2', null);
    if (aiMove) {
      state = applyMove(state, 'p2', aiMove);
      renderAll();  // 显示 AI 出的牌，玩家才能决策跟牌
    }
  }
}

// ── Keyboard shortcut ───────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') playTurn();
});

// ── Init ─────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', playTurn);
document.getElementById('btn-restart').addEventListener('click', initGame);
initGame();


</script>
